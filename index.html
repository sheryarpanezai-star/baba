<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Akram Khan Panezai">
  <meta name="theme-color" content="#f0f2f5">
  <title>Akram Khan Panezai</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { -webkit-user-select: none; user-select: none; font-family: 'Inter', -apple-system, sans-serif; box-sizing: border-box; }
    input, textarea, select { -webkit-user-select: text; user-select: text; }
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); background: #f5f7fa !important; color: #333; }
    .safe-area-pb { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
    @supports (padding: max(0px)) {
      body { padding-left: max(0px, env(safe-area-inset-left)); padding-right: max(0px, env(safe-area-inset-right)); }
    }
    button { min-height: 44px; }
    input, textarea, select { min-height: 44px; font-size: 16px !important; background: #fff !important; color: #333 !important; border: 1.5px solid #d0d5dd !important; border-radius: 8px !important; }
    input:focus, textarea:focus, select:focus { border-color: #1a73e8 !important; outline: none; box-shadow: 0 0 0 3px rgba(26,115,232,0.12); }
    input::placeholder, textarea::placeholder { color: #aaa !important; }
    .compliance-ring { display: flex; align-items: center; justify-content: center; }
    .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 40; backdrop-filter: blur(4px); }
    .modal { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 16px 16px 0 0; max-height: 90vh; overflow-y: auto; z-index: 50; box-shadow: 0 -8px 30px rgba(0,0,0,0.12); }
    .grid-responsive { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 10px; }
    @media (max-width: 768px) {
      .grid-responsive { grid-template-columns: 1fr; }
    }
    /* Clean Medical card styles */
    .bb-card { background: #fff !important; border: 1px solid #e8ecf0 !important; border-left: none !important; border-radius: 12px !important; overflow: hidden; min-width: 0; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .bb-card-header { background: #fff !important; border-bottom: 1px solid #f0f2f5 !important; }
    .bb-btn { background: #1a73e8 !important; color: #fff !important; font-weight: 600; border-radius: 8px !important; text-transform: uppercase; letter-spacing: 0.3px; font-size: 12px; }
    .bb-btn:active { background: #1557b0 !important; transform: scale(0.98); }
    .bb-btn-secondary { background: #fff !important; color: #1a73e8 !important; border: 1.5px solid #d0d5dd !important; border-radius: 8px !important; font-weight: 600; }
    .bb-btn-secondary:active { background: #f5f7fa !important; }
    .bb-toggle-on { background: #e6f4ea !important; border: 1.5px solid #137333 !important; color: #137333 !important; border-radius: 8px !important; }
    .bb-toggle-off { background: #fff !important; border: 1.5px solid #e0e0e0 !important; color: #999 !important; border-radius: 8px !important; }
    .bb-progress-track { background: #e8ecf0 !important; border-radius: 6px !important; }
    .bb-progress-fill { border-radius: 6px !important; }
    .bb-vital-green { background: #e6f4ea !important; color: #137333 !important; }
    .bb-vital-orange { background: #fef7e0 !important; color: #e8710a !important; }
    .bb-vital-red { background: #fce8e6 !important; color: #c5221f !important; }
    .bb-vital-gray { background: #f5f5f5 !important; color: #999 !important; }
    /* Table overrides for weekly view */
    table { border-collapse: collapse; }
    th, td { border-color: #e8ecf0 !important; }
    th { background: #f5f8ff !important; color: #1a73e8 !important; font-weight: 600; }
    td { background: #fff !important; }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d0d5dd; border-radius: 4px; }
    /* Alert banner */
    .bb-alert { background: #fce8e6 !important; border-left: none !important; border-radius: 12px !important; border: 1px solid #f5c6c2 !important; }
    .bb-setup { background: #fef7e0 !important; border-left: none !important; border-radius: 12px !important; border: 1px solid #f5e6b8 !important; }
    /* Global overrides for Tailwind classes */
    .bg-white, .bg-gray-50, .bg-gray-100 { background: #fff !important; }
    .bg-green-50, .bg-green-100 { background: #e6f4ea !important; }
    .bg-amber-50, .bg-yellow-50 { background: #fef7e0 !important; }
    .bg-red-50, .bg-red-100 { background: #fce8e6 !important; }
    .bg-blue-50, .bg-indigo-50, .bg-purple-50 { background: #e8f0fe !important; }
    .text-gray-800, .text-gray-700, .text-gray-600 { color: #333 !important; }
    .text-gray-500, .text-gray-400, .text-gray-300 { color: #666 !important; }
    .text-green-500, .text-green-600, .text-green-700 { color: #137333 !important; }
    .text-amber-600, .text-amber-700, .text-yellow-700 { color: #e8710a !important; }
    .text-red-500, .text-red-600, .text-red-800, .text-red-900 { color: #c5221f !important; }
    .text-blue-600, .text-blue-700, .text-violet-600 { color: #1a73e8 !important; }
    .text-indigo-700, .text-purple-700 { color: #7b1fa2 !important; }
    .border-gray-200, .border-gray-300, .border-gray-100 { border-color: #e8ecf0 !important; }
    .border-green-500, .border-green-200 { border-color: #137333 !important; }
    .border-amber-200 { border-color: #e8710a !important; }
    .border-red-200 { border-color: #c5221f !important; }
    .bg-blue-500, .bg-blue-400, .bg-blue-600 { background: #1a73e8 !important; color: #fff !important; }
    .bg-green-500 { background: #137333 !important; color: #fff !important; }
    .bg-purple-500 { background: #7b1fa2 !important; color: #fff !important; }
    .bg-amber-500 { background: #e8710a !important; color: #fff !important; }
    .bg-teal-500 { background: #00897b !important; color: #fff !important; }
    .bg-gray-200 { background: #e8ecf0 !important; }
    .border-t { border-color: #e8ecf0 !important; }
    .border-b { border-color: #e8ecf0 !important; }
    .border { border-color: #e8ecf0 !important; }
    .rounded-lg, .rounded-xl { border-radius: 12px !important; }
    .rounded-full { border-radius: 12px !important; }
    .shadow-sm { box-shadow: 0 1px 4px rgba(0,0,0,0.06) !important; }
    label { color: #555; }
    a { color: #1a73e8 !important; }
    /* Font overrides */
    h1, h2, h3, p, span, button, label, td, th, div { font-family: 'Inter', -apple-system, sans-serif !important; }
    /* Settings modal */
    .modal .sticky { background: #fff !important; border-color: #e8ecf0 !important; }
    .modal h2 { color: #1a73e8 !important; }
    .modal label { color: #555 !important; }
    /* Tab navigation */
    .care-tabs { display: flex; background: #fff; border-bottom: 2px solid #e8ecf0; padding: 0 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .care-tabs::-webkit-scrollbar { display: none; }
    .care-tab { padding: 10px 14px; font-size: 12px; font-weight: 600; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: all 0.2s; background: none; border-left: none; border-right: none; border-top: none; min-height: 38px; }
    .care-tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }
    .care-tab:hover:not(.active) { color: #1a73e8; }
  </style>
</head>
<body class="bg-gray-100">
  <div id="app"></div>

  <script>
    // ============= STATE MANAGEMENT =============
    const state = {
      currentDate: (() => { const n = new Date(); return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0') + '-' + String(n.getDate()).padStart(2,'0'); })(),
      view: 'daily', // 'daily', 'weekly', 'monthly'
      activeTab: 'overview', // 'overview', 'meds', 'meals', 'care'
      firebase: { configured: false, db: null },
      alerts: {
        phone: localStorage.getItem('alerts_phone') || '',
        apiKey: localStorage.getItem('alerts_apiKey') || '',
        recipients: JSON.parse(localStorage.getItem('alerts_recipients') || '[]'),
        reportTime: localStorage.getItem('alerts_reportTime') || '21:00',
        medTime: localStorage.getItem('alerts_medTime') || '10:00',
        waterNoon: localStorage.getItem('alerts_waterNoon') || '500',
        waterEod: localStorage.getItem('alerts_waterEod') || '1500',
        vitalDayTime: localStorage.getItem('alerts_vitalDayTime') || '08:00',
        vitalNightTime: localStorage.getItem('alerts_vitalNightTime') || '20:00',
        lastReportSent: localStorage.getItem('alerts_lastReportSent') || ''
      },
      settings: {
        setupExpanded: false,
        settingsOpen: false,
        firebaseApiKey: localStorage.getItem('firebase_apiKey') || 'AIzaSyC8ghzzMf9UVjMLEahJYNMhgdFkgjl1tO4',
        firebaseProjectId: localStorage.getItem('firebase_projectId') || 'babacare-5ace3',
        firebaseDbUrl: localStorage.getItem('firebase_dbUrl') || 'https://babacare-5ace3-default-rtdb.asia-southeast1.firebasedatabase.app'
      },
      dailyData: {},
      monthlyTasks: {},
      lastAlertCheck: 0
    };

    // ============= FIREBASE SETUP =============
    function initFirebase() {
      if (!state.settings.firebaseApiKey || !state.settings.firebaseDbUrl) return;

      try {
        const config = {
          apiKey: state.settings.firebaseApiKey,
          projectId: state.settings.firebaseProjectId,
          databaseURL: state.settings.firebaseDbUrl
        };

        if (!firebase.apps.length) {
          firebase.initializeApp(config);
        }

        state.firebase.db = firebase.database();
        state.firebase.storage = firebase.storage();
        state.firebase.configured = true;

        // Listen for changes
        const dateKey = state.currentDate.replace(/-/g, '');
        const ref = state.firebase.db.ref(`days/${dateKey}`);
        ref.on('value', (snapshot) => {
          if (snapshot.val()) {
            state.dailyData = snapshot.val();
            render();
          }
        });

        // Sync medicine stock from Firebase
        state.firebase.db.ref('medicineStock').on('value', (snapshot) => {
          if (snapshot.val()) {
            localStorage.setItem('medicineStock', JSON.stringify(snapshot.val()));
          }
        });
      } catch (e) {
        console.error('Firebase error:', e);
        state.firebase.configured = false;
      }
    }

    function saveToFirebase(path, data) {
      if (!state.firebase.configured || !state.firebase.db) {
        localStorage.setItem(`cached_${path}`, JSON.stringify(data));
        return;
      }
      try {
        state.firebase.db.ref(path).set(data);
      } catch (e) {
        console.error('Firebase save error:', e);
      }
    }

    function loadFromLocalStorage(key, defaultVal = {}) {
      try {
        return JSON.parse(localStorage.getItem(key) || JSON.stringify(defaultVal));
      } catch {
        return defaultVal;
      }
    }

    // ============= UTILITY FUNCTIONS =============
    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function getDayOfWeek(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short' });
    }

    function getYearMonth(dateStr) {
      return dateStr.substring(0, 7);
    }

    function addDays(dateStr, days) {
      const d = new Date(dateStr + 'T00:00:00');
      d.setDate(d.getDate() + days);
      // Use local date parts (not toISOString which converts to UTC and causes off-by-one in UTC+ timezones)
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function getVitalStatus(metric, value) {
      if (metric === 'bp') {
        if (!value || value === '--') return 'gray';
        const parts = value.split('/');
        if (parts.length === 2) {
          const sys = parseInt(parts[0]), dia = parseInt(parts[1]);
          if (sys >= 180 || dia >= 120) return 'red';
          if (sys >= 140 || dia >= 90) return 'orange';
          if (sys < 90 || dia < 60) return 'orange';
        }
        return 'green';
      }
      if (metric === 'hr') return value > 100 || value < 60 ? 'orange' : 'green';
      if (metric === 'o2') return value < 95 ? 'red' : 'green';
      if (metric === 'temp') return value > 99.5 || value < 96.8 ? 'orange' : 'green';
      if (metric === 'sugar') return value > 180 || value < 80 ? 'orange' : 'green';
      if (metric === 'urine') {
        if (!value || value === 0) return 'gray';
        return value < 200 ? 'red' : value < 400 ? 'orange' : 'green';
      }
      return 'gray';
    }

    function calculateCompliance() {
      const data = state.dailyData;
      const checks = [
        data.morningMed, data.eveningMed, !!data.vitals?.day, !!data.vitals?.night,
        (data.waterDay || 0) + (data.waterNight || 0) + (data.waterIntake || 0) >= 1200, (data.bipapDay || 0) + (data.bipapNight || 0) >= 8
      ];
      const completed = checks.filter(Boolean).length;
      return completed / checks.length;
    }

    function getRedFlags() {
      const data = state.dailyData;
      const flags = [];

      if (data.morningMed === false) flags.push({ type: 'med', msg: '⚠ Morning medication not given' });
      if (data.eveningMed === false) flags.push({ type: 'med', msg: '⚠ Evening medication not given' });
      const totalFluid = (data.waterDay || 0) + (data.waterNight || 0) + (data.waterIntake || 0);
      if (totalFluid < 500) flags.push({ type: 'water', msg: '⚠ Low water intake (' + totalFluid + ' mL)' });
      ['day', 'night'].forEach(shift => {
        const v = (data.vitals || {})[shift];
        if (v) {
          if (getVitalStatus('o2', v.o2) === 'red') flags.push({ type: 'vital', msg: `⚠ Low oxygen (${shift} shift)` });
          if (getVitalStatus('hr', v.hr) === 'red') flags.push({ type: 'vital', msg: `⚠ Abnormal heart rate (${shift} shift)` });
          if (getVitalStatus('bp', v.bp) === 'red') flags.push({ type: 'vital', msg: `⚠ High BP (${shift} shift)` });
        }
      });
      const totalUrine = (data.urineDay || 0) + (data.urineNight || 0);
      if (totalUrine > 0 && totalUrine < 500) flags.push({ type: 'fluid', msg: '⚠ Daily urine output low (' + totalUrine + ' mL)' });
      const totalBipap = (data.bipapDay || 0) + (data.bipapNight || 0);
      if (totalBipap < 8 && new Date().getHours() >= 20) flags.push({ type: 'bipap', msg: '⚠ BiPAP below 8hr target (' + totalBipap + ' hrs)' });
      const hr = new Date().getHours();
      if (!data.vitals?.day && hr >= 10) flags.push({ type: 'vital', msg: '⚠ Day shift vitals not recorded' });
      if (!data.vitals?.night && hr >= 22) flags.push({ type: 'vital', msg: '⚠ Night shift vitals not recorded' });

      return flags;
    }

    // ============= RENDER FUNCTIONS =============
    function render() {
      const html = renderApp();
      document.getElementById('app').innerHTML = html;
      attachEventListeners();
    }

    function renderApp() {
      const flags = getRedFlags();
      let html = '';

      // Header
      html += `
        <div class="sticky top-0 z-30" style="background:#fff; box-shadow:0 1px 4px rgba(0,0,0,0.06);">
          <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <div>
              <h1 class="font-bold" style="color:#1a1a1a; font-size:16px;">Akram Khan Panezai</h1>
              <p style="font-size:11px; color:#888; margin-top:1px;">${formatDate(state.currentDate)} · Age 87</p>
            </div>
            <button id="settingsBtn" class="p-2" style="color:#888; font-size:20px; background:none; border:none; min-height:36px;">⚙</button>
          </div>
          <div class="max-w-6xl mx-auto px-4 pb-2 flex gap-2">
            <button class="tab-btn px-4 py-1.5 text-xs font-semibold" style="background:${state.view === 'daily' ? '#1a73e8' : '#fff'}; color:${state.view === 'daily' ? '#fff' : '#666'}; border:1.5px solid ${state.view === 'daily' ? '#1a73e8' : '#d0d5dd'}; border-radius:20px; min-height:32px;" data-view="daily">Daily</button>
            <button class="tab-btn px-4 py-1.5 text-xs font-semibold" style="background:${state.view === 'weekly' ? '#1a73e8' : '#fff'}; color:${state.view === 'weekly' ? '#fff' : '#666'}; border:1.5px solid ${state.view === 'weekly' ? '#1a73e8' : '#d0d5dd'}; border-radius:20px; min-height:32px;" data-view="weekly">Weekly</button>
            <button class="tab-btn px-4 py-1.5 text-xs font-semibold" style="background:${state.view === 'monthly' ? '#1a73e8' : '#fff'}; color:${state.view === 'monthly' ? '#fff' : '#666'}; border:1.5px solid ${state.view === 'monthly' ? '#1a73e8' : '#d0d5dd'}; border-radius:20px; min-height:32px;" data-view="monthly">Monthly</button>
          </div>
        </div>
      `;

      // Firebase setup banner
      if (!state.firebase.configured) {
        html += renderFirebaseSetupBanner();
      }

      // Red flag alerts
      if (flags.length > 0) {
        html += `
          <div class="bb-alert p-3 max-w-6xl mx-auto mt-2">
            <p class="font-bold text-xs uppercase mb-2" style="color:#c5221f; letter-spacing:1px;">▸ ALERTS</p>
            <div class="space-y-1">
              ${flags.map(f => `<p class="text-xs" style="color:#ff6666;">${f.msg}</p>`).join('')}
            </div>
          </div>
        `;
      }

      // Date navigation for daily view
      if (state.view === 'daily') {
        html += `
          <div class="max-w-6xl mx-auto px-4 py-2 flex items-center justify-between" style="background:#fff; margin-top:1px;">
            <button id="prevDayBtn" class="bb-btn-secondary px-3 py-1.5 text-xs font-semibold" style="min-height:34px; border-radius:20px;">◀ Prev</button>
            <span style="font-size:13px; font-weight:600; color:#333;">${formatDate(state.currentDate)}</span>
            <button id="nextDayBtn" class="bb-btn-secondary px-3 py-1.5 text-xs font-semibold" style="min-height:34px; border-radius:20px;" ${state.currentDate >= ((() => { const n = new Date(); return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0') + '-' + String(n.getDate()).padStart(2,'0'); })()) ? 'style="opacity:0.3; cursor:not-allowed; min-height:34px; border-radius:20px;" disabled' : ''}>Next ▶</button>
          </div>
        `;
        html += renderDailyView();
      } else if (state.view === 'weekly') {
        html += renderWeeklyView();
      } else if (state.view === 'monthly') {
        html += renderMonthlyView();
      }

      // Settings modal
      if (state.settings.settingsOpen) {
        html += renderSettingsModal();
      }

      return html;
    }

    function renderFirebaseSetupBanner() {
      return `
        <div class="bb-setup p-4 sticky top-20 z-20">
          <div class="flex items-center justify-between cursor-pointer" id="setupToggle">
            <div class="flex items-center gap-3 flex-1">
              <span class="text-2xl">⚙️</span>
              <div>
                <p class="font-semibold" style="color:#1a73e8;">SETUP REQUIRED: Firebase Not Configured</p>
                <p class="text-sm text-amber-800">This app uses Firebase for real-time data sync. Click to configure.</p>
              </div>
            </div>
            <span class="text-xl">${state.settings.setupExpanded ? '▼' : '▶'}</span>
          </div>
          ${state.settings.setupExpanded ? `
            <div class="mt-4 bg-white rounded-lg p-4 space-y-3">
              <div class="text-sm text-gray-700 space-y-2">
                <p class="font-semibold">Steps to set up Firebase:</p>
                <ol class="list-decimal list-inside space-y-1">
                  <li>Go to <a href="https://console.firebase.google.com" target="_blank" class="text-blue-600 underline">Firebase Console</a></li>
                  <li>Create a new project or select existing</li>
                  <li>Enable Realtime Database (test mode)</li>
                  <li>Enable Storage (for medicine photos)</li>
                  <li>Get API Key from Settings > Project Settings</li>
                  <li>Get Project ID and Database URL</li>
                </ol>
              </div>
              <input type="text" id="firebaseApiKey" placeholder="API Key" value="${state.settings.firebaseApiKey}" class="w-full border rounded px-3 py-2 text-sm">
              <input type="text" id="firebaseProjectId" placeholder="Project ID" value="${state.settings.firebaseProjectId}" class="w-full border rounded px-3 py-2 text-sm">
              <input type="text" id="firebaseDbUrl" placeholder="Database URL (https://...firebaseio.com)" value="${state.settings.firebaseDbUrl}" class="w-full border rounded px-3 py-2 text-sm">
              <button id="setupBtn" class="bb-btn w-full px-3 py-2 text-xs">CONNECT FIREBASE</button>
            </div>
          ` : ''}
        </div>
      `;
    }

    function renderSettingsModal() {
      return `
        <div class="modal-backdrop" id="settingsBackdrop"></div>
        <div class="modal">
          <div class="sticky top-0 p-4 flex items-center justify-between" style="background:#fff; border-bottom:1px solid #e8ecf0;">
            <h2 style="font-size:14px; font-weight:700; color:#1a1a1a;">Settings & Alerts</h2>
            <button id="closeSettingsBtn" style="color:#888; font-size:20px; background:none; border:none; min-height:36px; cursor:pointer;">✕</button>
          </div>
          <div class="p-4 space-y-4 safe-area-pb">
            <p class="text-xs font-bold uppercase" style="color:#1a73e8; letter-spacing:1px;">DAILY REPORT (WHATSAPP)</p>
            <div>
              <label class="block text-xs font-semibold mb-1" style="color:#999;">Family Recipients (one per line: Name,Phone,APIKey)</label>

    function renderDailyView() {
      const data = state.dailyData || {};
      const compliance = calculateCompliance();
      const t = state.activeTab;

      // Tab definitions — matches actual daily nursing workflow
      const tabs = [
        { id: 'overview', label: 'Overview' },
        { id: 'meds', label: 'Medications' },
        { id: 'meals', label: 'Meals & Fluids' },
        { id: 'care', label: 'Care' }

      // Tab content mapping
      const tabContent = {
        // Overview: nurse arrives → start shift → vitals → notes → check tasks/events
        overview: `
          ${renderCard('Nurse Shift', '👩‍⚕️', renderNurseShiftCard(data))}
          ${renderCard('Vitals', '♥️', renderVitalsCard(data))}
          ${renderCard('Nursing Notes', '📝', renderNursingNotesCard(data))}

          ${renderCard('Upcoming Events', '📅', renderMonthlyTasksCard(data))}

        meds: `
          ${renderCard('Medications', '💊', renderMedicationsCard(data))}
          ${renderCard('Supplements', '💊', renderSupplementsCard(data))}
          ${renderCard('Pharmacy & Supplies', '🏥', renderPharmacyCard(data))}

          ${renderCard('Nutrition', '🍽️', renderNutritionCard(data))}
          ${renderCard('Fluid Balance', '💧', renderFluidBalanceCard(data))}

        care: `
          ${renderCard('Hygiene', '🚿', renderHygieneCard(data))}
          ${renderCard('Physiotherapy', '🏋️', renderPhysioCard(data))}
          ${renderCard('Activities', '🌳', renderActivitiesCard(data))}

      return `

        <div class="care-tabs max-w-6xl mx-auto" style="margin-top:8px;">
          ${tabs.map(tab => `<div class="care-tab ${t === tab.id ? 'active' : ''}" data-care-tab="${tab.id}">${tab.label}</div>`).join('')}

        <div class="max-w-6xl mx-auto px-4 py-3 grid-responsive">
          ${tabContent[t] || tabContent.overview}

    function renderCard(title, icon, content, accent = '') {
      return `
        <div class="bb-card">
          <div class="bb-card-header px-4 py-3 flex items-center gap-2">
            <span style="font-size:14px;">${icon}</span>
            <h3 style="font-size:11px; font-weight:700; color:#1a73e8; text-transform:uppercase; letter-spacing:0.5px;">${title}</h3>
          </div>
          <div class="p-3" style="color:#444; overflow:hidden; min-width:0;">${content}</div>
        </div>
      `;
    }

    function renderComplianceBar(pct) {
      const color = pct > 0.8 ? '#137333' : pct > 0.5 ? '#1a73e8' : '#c5221f';
      const pctNum = Math.round(pct * 100);
      return `
        <div style="background:#fff; border:1px solid #e8ecf0; border-radius:12px; padding:10px 14px; display:flex; align-items:center; gap:12px; box-shadow:0 1px 4px rgba(0,0,0,0.06);">
          <div style="width:36px; height:36px; border-radius:50%; border:3px solid ${color}; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
            <span style="font-size:10px; font-weight:700; color:${color};">${pctNum}%</span>
          </div>
          <div style="flex:1;">
            <div style="font-size:11px; color:#555; margin-bottom:4px;">Daily tasks</div>
            <div style="background:#e8ecf0; height:6px; border-radius:6px; overflow:hidden;">
              <div style="height:100%; width:${pctNum}%; background:${color}; border-radius:6px; transition:width 0.7s;"></div>
            </div>
          </div>
          <span style="font-size:13px; font-weight:700; color:${color}; min-width:40px; text-align:right;">${Math.round(pct * 100)}%</span>
        </div>
      `;
    }

    function renderVitalsCard(data) {
      const vitals = data.vitals || {};
      const dayV = vitals.day || null;
      const nightV = vitals.night || null;

      function renderShiftBlock(label, emoji, v) {
        if (!v) return `<div style="background:#f5f5f5; border:1px solid #dde; border-radius:2px; padding:8px; text-align:center;"><span style="font-size:11px; color:#999;">${emoji} ${label} — NOT RECORDED</span></div>`;
        return `
          <div style="background:#fff; border:1px solid #d0d5dd; border-radius:2px; padding:8px;">
            <p style="font-size:11px; font-weight:700; color:#1a73e8; margin-bottom:4px;">${emoji} ${label} <span style="color:#999; font-weight:400;">${v.time || ''}</span></p>
            <div class="grid grid-cols-3 gap-1">
              ${renderVitalReading('BP', v.bp || '--', 'mmHg', getVitalStatus('bp', v.bp))}
              ${renderVitalReading('HR', v.hr || '0', 'bpm', getVitalStatus('hr', v.hr))}
              ${renderVitalReading('O₂', v.o2 || '0', '%', getVitalStatus('o2', v.o2))}
              ${renderVitalReading('Temp', v.temp || '0', '°F', getVitalStatus('temp', v.temp))}
              ${renderVitalReading('Sugar', v.sugar || '0', 'mg/dL', getVitalStatus('sugar', v.sugar))}
            </div>
          </div>`;
      }

      return `
        <div class="space-y-3">
          ${renderShiftBlock('Day Shift', '☀️', dayV)}
          ${renderShiftBlock('Night Shift', '🌙', nightV)}
          <form id="vitalsForm" class="space-y-2 mt-3 pt-3" style="border-top:1px solid #d0d5dd;">
            <select id="vitals_shift" class="w-full border rounded px-2 py-2 text-xs font-bold">
              <option value="day"${dayV ? ' disabled' : ''}>☀️ DAY SHIFT${dayV ? ' (RECORDED)' : ''}</option>
              <option value="night"${nightV ? ' disabled' : ''}>🌙 NIGHT SHIFT${nightV ? ' (RECORDED)' : ''}</option>
            </select>
            <input type="text" id="vitals_bp" placeholder="BP (e.g., 120/80)" class="w-full border rounded px-2 py-1 text-xs">
            <input type="number" id="vitals_hr" placeholder="Heart Rate (bpm)" class="w-full border rounded px-2 py-1 text-xs">
            <input type="number" id="vitals_o2" placeholder="O₂ %" class="w-full border rounded px-2 py-1 text-xs">
            <input type="number" id="vitals_temp" placeholder="Temp °F (e.g., 98.6)" step="0.1" class="w-full border rounded px-2 py-1 text-xs">
            <input type="number" id="vitals_sugar" placeholder="Blood Sugar (mg/dL)" class="w-full border rounded px-2 py-1 text-xs">
            <button type="button" id="addVitalsBtn" class="bb-btn w-full px-2 py-2 text-xs"${dayV && nightV ? ' disabled style="opacity:0.3"' : ''}>SAVE VITALS</button>
          </form>
        </div>
      `;
    }

    function renderVitalReading(label, value, unit, status) {
      const cls = status === 'green' ? 'bb-vital-green' : status === 'orange' ? 'bb-vital-orange' : status === 'red' ? 'bb-vital-red' : 'bb-vital-gray';
      return `
        <div class="${cls}" style="border-radius:2px; padding:6px; display:flex; flex-direction:column; align-items:center; gap:1px;">
          <span style="font-size:10px; color:#999;">${label}</span>
          <span style="font-size:13px; font-weight:700;">${value}</span>
          <span style="font-size:9px; color:#999;">${unit}</span>
        </div>
      `;
    }

    function renderMedicationsCard(data) {
      const amMeds = ['Loprin 75mg','Lasix 40mg','Epleron 50mg','Uperio 50mg','Concor 2.5mg','Nexium 40mg'];
      const pmMeds = ['Ebixa 20mg','Lipiget 10mg','Uperio 50mg','Brintillix 10mg','Exelon Patch 9.5mg'];
      const stock = JSON.parse(localStorage.getItem('medicineStock') || '[]');
      function getStockForMed(medName) {
        const name = medName.replace(/\s*\d+(\.\d+)?\s*mg/i, '').trim().toLowerCase();
        const match = stock.find(s => s.name.toLowerCase().includes(name) || name.includes(s.name.toLowerCase()));
        return match ? match : null;
      }
      function medWithStock(m) {
        const s = getStockForMed(m);
        if (!s) return '<p style="font-size:10px; color:#444; padding:1px 0;">• ' + m + '</p>';
        const daysLeft = s.dailyUse > 0 ? Math.floor(s.qty / s.dailyUse) : null;
        const qtyColor = s.qty <= 0 ? '#c5221f' : (daysLeft !== null && daysLeft <= 7) ? '#1a73e8' : '#137333';
        return '<div style="display:flex; justify-content:space-between; align-items:center; padding:1px 0;">' +
          '<span style="font-size:10px; color:#444;">• ' + m + '</span>' +
          '<span style="font-size:9px; font-weight:700; color:' + qtyColor + ';">' + s.qty + '</span>' +
          '</div>';
      }
      return `
        <div class="space-y-3">
          <div class="flex gap-3">
            <button id="toggleMorningMed" class="flex-1 p-3 font-bold text-xs ${data.morningMed ? 'bb-toggle-on' : 'bb-toggle-off'}" style="border-width:2px; border-radius:2px;">
              ☀️ MORNING ${data.morningMed ? '✓' : ''}
            </button>
            <button id="toggleEveningMed" class="flex-1 p-3 font-bold text-xs ${data.eveningMed ? 'bb-toggle-on' : 'bb-toggle-off'}" style="border-width:2px; border-radius:2px;">
              🌙 EVENING ${data.eveningMed ? '✓' : ''}
            </button>
          </div>
          <!-- Medicine List -->
          <div class="grid grid-cols-2 gap-2">
            <div style="background:#f5f5f5; border:1px solid #d0d5dd; border-radius:2px; padding:6px;">
              <p style="font-size:10px; font-weight:700; color:#1a73e8; margin-bottom:4px;">☀️ AM MEDICINES</p>
              ${amMeds.map(m => medWithStock(m)).join('')}
            </div>
            <div style="background:#f5f5f5; border:1px solid #d0d5dd; border-radius:2px; padding:6px;">
              <p style="font-size:10px; font-weight:700; color:#1a73e8; margin-bottom:4px;">🌙 PM MEDICINES</p>
              ${pmMeds.map(m => medWithStock(m)).join('')}
            </div>
          </div>
          <div class="pt-3 space-y-3" style="border-top:1px solid #d0d5dd;">
            <p class="text-xs flex items-center gap-1" style="color:#999;">📷 PHOTO REQUIRED BEFORE MARKING</p>
            <!-- Morning Photo -->
            <div class="p-2" style="border-radius:2px; background:${data.morningMedPhoto ? (data.morningMed ? '#e6f4ea' : '#fef7e0') : '#fce8e6'}; border:1px solid ${data.morningMedPhoto ? (data.morningMed ? '#137333' : '#1557b0') : '#c5221f'};">
              <p class="text-xs font-bold mb-1" style="color:#1a73e8;">☀️ MORNING MEDS PHOTO</p>
              ${data.morningMedPhoto
                ? `<div class="flex items-center gap-2">
                    <img src="${data.morningMedPhoto}" alt="Morning meds" class="w-20 h-16 object-cover" style="border:1px solid #d0d5dd; border-radius:2px;">
                    <span class="text-xs" style="color:#999;">${data.morningMedPhotoTime || 'Uploaded'}</span>
                  </div>`
                : `<label class="flex items-center gap-2 px-3 py-2 cursor-pointer w-fit" style="background:#f5f5f5; border:1px dashed #555; border-radius:2px;">
                    <span class="text-xs font-bold" style="color:#1a73e8;">📷 TAKE / UPLOAD PHOTO</span>
                    <input type="file" id="morningMedPhoto" accept="image/*" capture="environment" class="hidden">
                  </label>`}
            </div>
            <!-- Evening Photo -->
            <div class="p-2" style="border-radius:2px; background:${data.eveningMedPhoto ? (data.eveningMed ? '#e6f4ea' : '#fef7e0') : '#fce8e6'}; border:1px solid ${data.eveningMedPhoto ? (data.eveningMed ? '#137333' : '#1557b0') : '#c5221f'};">
              <p class="text-xs font-bold mb-1" style="color:#1a73e8;">🌙 EVENING MEDS PHOTO</p>
              ${data.eveningMedPhoto
                ? `<div class="flex items-center gap-2">
                    <img src="${data.eveningMedPhoto}" alt="Evening meds" class="w-20 h-16 object-cover" style="border:1px solid #d0d5dd; border-radius:2px;">
                    <span class="text-xs" style="color:#999;">${data.eveningMedPhotoTime || 'Uploaded'}</span>
                  </div>`
                : `<label class="flex items-center gap-2 px-3 py-2 cursor-pointer w-fit" style="background:#f5f5f5; border:1px dashed #555; border-radius:2px;">
                    <span class="text-xs font-medium text-violet-600">📷 Take / Upload Photo</span>
                    <input type="file" id="eveningMedPhoto" accept="image/*" capture="environment" class="hidden">
                  </label>`}
            </div>
          </div>
        </div>
      `;
    }

    function renderSupplementsCard(data) {
      const sup = data.supplements || {};
      return `
        <div class="space-y-2">
          <!-- K-Lyte -->
          <div style="background:#f5f5f5; border:1px solid #d0d5dd; border-radius:2px; padding:8px; display:flex; align-items:center; justify-content:space-between;">

                <span>☀️ DAY</span>
                <span>${sup.ensureDay ? '✓' : '—'}</span>
              </button>
              <button id="toggleEnsureNight" class="font-bold text-xs ${sup.ensureNight ? 'bb-toggle-on' : 'bb-toggle-off'}" style="border-width:2px; border-radius:2px; padding:8px; display:flex; align-items:center; justify-content:space-between;">

    function renderFluidBalanceCard(data) {
      const waterDay = data.waterDay || 0;
      const waterNight = data.waterNight || 0;
      const totalWater = waterDay + waterNight + (data.waterIntake || 0);
      const target = 1200;
      const pct = Math.min(totalWater / target, 1);
      const urineDay = data.urineDay || 0;
      const urineNight = data.urineNight || 0;
      const totalUrine = urineDay + urineNight;
      const netBalance = totalWater - totalUrine;

      return `
        <div class="space-y-3">
          <p class="text-xs font-bold uppercase" style="color:#999; letter-spacing:1px;">FLUID INTAKE</p>
          <div class="flex items-center justify-between">
            <span class="text-sm font-bold" style="color:#1a73e8;">💧 ${totalWater} / ${target} mL</span>

            </div>
            <div>
              <label style="font-size:9px; color:#999; display:block; margin-bottom:4px;">🌙 NIGHT (mL)</label>
              <input type="number" id="waterNightInput" placeholder="mL" value="${waterNight || ''}" class="w-full border rounded px-2 py-2 text-xs">
            </div>
          </div>

          <div class="pt-3 mt-2" style="border-top:1px solid #d0d5dd;">
            <p class="text-xs font-bold uppercase mb-2" style="color:#999; letter-spacing:1px;">URINE OUTPUT</p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
              <div>
                <label style="font-size:9px; color:#999; display:block; margin-bottom:4px;">☀️ DAY (mL)</label>
                <input type="number" id="urineDayInput" placeholder="mL" value="${urineDay || ''}" class="w-full border rounded px-2 py-2 text-xs">

              <div>
                <label style="font-size:9px; color:#999; display:block; margin-bottom:4px;">🌙 NIGHT (mL)</label>
                <input type="number" id="urineNightInput" placeholder="mL" value="${urineNight || ''}" class="w-full border rounded px-2 py-2 text-xs">

            </div>

                <select id="urineColorInput" class="w-full border rounded px-2 py-2 text-xs">

                  <option value="pale yellow" ${data.urineColor === 'pale yellow' ? 'selected' : ''}>Pale Yellow</option>
                  <option value="yellow" ${data.urineColor === 'yellow' ? 'selected' : ''}>Yellow</option>
                  <option value="dark yellow" ${data.urineColor === 'dark yellow' ? 'selected' : ''}>Dark Yellow</option>
                  <option value="amber" ${data.urineColor === 'amber' ? 'selected' : ''}>Amber</option>
                  <option value="brown" ${data.urineColor === 'brown' ? 'selected' : ''}>Brown</option>
                  <option value="red/bloody" ${data.urineColor === 'red/bloody' ? 'selected' : ''}>Red/Bloody</option>
                  <option value="cloudy" ${data.urineColor === 'cloudy' ? 'selected' : ''}>Cloudy</option>

                <label style="font-size:9px; color:#999; display:block; margin-bottom:4px;">🧪 DEBRIS/SEDIMENT</label>

                  <option value="" ${!(data.urineDebris) ? 'selected' : ''}>-- Select --</option>
                  <option value="none" ${data.urineDebris === 'none' ? 'selected' : ''}>None</option>
                  <option value="trace" ${data.urineDebris === 'trace' ? 'selected' : ''}>Trace</option>
                  <option value="moderate" ${data.urineDebris === 'moderate' ? 'selected' : ''}>Moderate</option>
                  <option value="heavy" ${data.urineDebris === 'heavy' ? 'selected' : ''}>Heavy</option>
                </select>
              </div>
            </div>
          </div>

          <button id="saveFluidBtn" class="bb-btn w-full px-2 py-2 text-xs">SAVE</button>

          <!-- Urine Appearance Summary -->
          ${data.urineColor || data.urineDebris ? `
          <div style="background:#f5f5f5; border:1px solid #d0d5dd; border-radius:2px; padding:8px;">

    function renderMonthlyTasksCard(data) {
      const ym = getYearMonth(state.currentDate);

      // Catheter countdown — every 4 weeks (28 days)
      const lastCatheter = localStorage.getItem('lastCatheterDate') || '2025-02-17';
      const lastCathDate = new Date(lastCatheter + 'T00:00:00');
      const cathDiffDays = Math.floor((now - lastCathDate) / (1000 * 60 * 60 * 24));
      const cathRemaining = 28 - cathDiffDays;
      const cathColor = cathRemaining <= 0 ? '#c5221f' : cathRemaining <= 3 ? '#c5221f' : cathRemaining <= 7 ? '#1a73e8' : '#137333';
      const cathNextDate = new Date(lastCathDate);
      cathNextDate.setDate(cathNextDate.getDate() + 28);
      const cathNextStr = cathNextDate.getFullYear() + '-' + String(cathNextDate.getMonth()+1).padStart(2,'0') + '-' + String(cathNextDate.getDate()).padStart(2,'0');

      // Vitamin D — 1st of every month
      let vitDTarget = new Date(now.getFullYear(), now.getMonth(), 1);
      if (now > vitDTarget) {
        vitDTarget = new Date(now.getFullYear(), now.getMonth() + 1, 1);
      }
      const vitDDiff = Math.floor((vitDTarget - now) / (1000 * 60 * 60 * 24));
      const vitDColor = vitDDiff <= 0 ? '#c5221f' : vitDDiff <= 3 ? '#1a73e8' : '#137333';
      const isVitDToday = vitDDiff === 0 || (now.getDate() === 1);

      return `
        <div class="space-y-3">
          <!-- Catheter -->
          <div style="background:#f5f5f5; border:1px solid ${cathRemaining <= 3 ? '#c5221f' : '#d0d5dd'}; border-radius:2px; padding:10px; text-align:center;">
            <span style="font-size:10px; color:#999; letter-spacing:1px;">CATHETER CHANGE</span>

            const flushLog = data.catheterFlush || [];

            const today = new Date(state.currentDate + 'T00:00:00');
            const flushDiff = lastFlushDate ? Math.floor((today - lastFlushDate) / (1000 * 60 * 60 * 24)) : 999;
            const flushRemaining = 7 - flushDiff;

    function loadJournalNotes() {
      const allNotes = [];
      // Scan localStorage for all day_ keys
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('day_')) {
          try {
            const dayData = JSON.parse(localStorage.getItem(key));
            if (dayData && dayData.notes && dayData.notes.length > 0) {
              const dateKey = key.replace('day_', '');
              const dateStr = dateKey.substring(0, 4) + '-' + dateKey.substring(4, 6) + '-' + dateKey.substring(6, 8);
              allNotes.push({ date: dateStr, notes: dayData.notes });
            }
          } catch (e) { /* skip corrupted entries */ }
        }
      }
      // Sort by date descending (most recent first)
      allNotes.sort((a, b) => b.date.localeCompare(a.date));
      return allNotes;
    }

    function renderJournalContent() {
      const allDays = loadJournalNotes();
      if (allDays.length === 0) {
        return '<p class="text-xs" style="color:#999;">No nursing notes found in any date.</p>';
      }
      const today = (() => { const n = new Date(); return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0') + '-' + String(n.getDate()).padStart(2,'0'); })();
      return allDays.map(day => {
        const isToday = day.date === today;
        const dayLabel = isToday ? 'TODAY' : getDayOfWeek(day.date);
        return `
          <div style="border:1px solid #d0d5dd; border-radius:2px; overflow:hidden;">
            <div style="background:#f5f5f5; padding:8px 12px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #d0d5dd;">

    function getWeekDayData(dateStr) {
      const dateKey = dateStr.replace(/-/g, '');
      const cached = localStorage.getItem('day_' + dateKey);
      return cached ? JSON.parse(cached) : {};
    }

    function renderWeeklyRow(label, path, days) {
      return `
        <tr>
          <td style="border:1px solid #d0d5dd; padding:4px; font-weight:700; font-size:11px; white-space:nowrap; color:#1a73e8; background:#f5f5f5;">${label}</td>
          ${days.map(d => {
            const dd = getWeekDayData(d);
            let val = '-';
            let color = '';
            const parts = path.split('.');
            let obj = dd;
            for (const p of parts) { obj = obj ? obj[p] : undefined; }

            if (path === 'hygiene.brushCount') {
              const hyg = dd.hygiene || {};
              const count = (hyg.brushAM ? 1 : 0) + (hyg.brushPM ? 1 : 0);
              val = count + '/2';
              color = count === 2 ? 'text-green-600' : count === 1 ? 'text-amber-600' : 'text-red-500';
            } else if (typeof obj === 'boolean') {
              val = obj ? '✓' : '—';
              color = obj ? 'text-green-600' : 'text-gray-300';
            } else if (typeof obj === 'number') {
              val = obj;
              if (path === 'waterDay' || path === 'waterNight') color = obj >= 600 ? 'text-green-600' : obj >= 300 ? 'text-amber-600' : 'text-red-500';
              if (path === 'bipapMinutes') color = obj >= 480 ? 'text-green-600' : obj >= 300 ? 'text-amber-600' : 'text-red-500';
            } else if (typeof obj === 'string' && obj) {
              val = obj;
            }

            return '<td style="border:1px solid #d0d5dd; padding:4px; text-align:center; font-size:11px; font-weight:600; background:#fff;" class="' + color + '">' + val + '</td>';
          }).join('')}
        </tr>
      `;
    }

    function renderMonthlyView() {
      const ym = getYearMonth(state.currentDate);
      const date = new Date(state.currentDate + 'T00:00:00');
      const firstDay = new Date(date.getFullYear(), date.getMonth(), 1);
      const lastDay = new Date(date.getFullYear(), date.getMonth() + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startDay = firstDay.getDay();

      let calendarHtml = '';
      const weeks = [];
      let week = Array(startDay).fill(null);

      for (let i = 1; i <= daysInMonth; i++) {
        const dayStr = `${ym}-${String(i).padStart(2, '0')}`;
        week.push(dayStr);
        if (week.length === 7) {
          weeks.push(week);
          week = [];
        }
      }
      if (week.length > 0) {
        while (week.length < 7) week.push(null);
        weeks.push(week);
      }

      calendarHtml = `
        <div class="max-w-6xl mx-auto px-4 py-4">
          <h3 class="text-sm font-bold mb-4 uppercase" style="color:#1a73e8; letter-spacing:1px;">${new Date(state.currentDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</h3>
          <div class="grid grid-cols-7 gap-1 mb-4">
            ${['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => `<div class="text-center font-bold text-xs p-2" style="color:#999;">${d}</div>`).join('')}
          </div>
          <div class="grid grid-cols-7 gap-1">
            ${weeks.map(w => w.map(d => {
              if (!d) return '<div style="background:#f0f2f5; border:1px solid #1a1a1a; border-radius:2px;" class="aspect-square"></div>';
              return `
                <button class="monthly-day aspect-square flex flex-col items-center justify-center text-xs font-bold" style="background:#fff; border:1px solid #d0d5dd; border-radius:2px; color:#1a73e8;" data-date="${d}">
                  <span>${d.substring(8)}</span>
                  <span style="font-size:9px; color:#999;">--%</span>
                </button>
              `;
            }).join('')).join('')}
          </div>
        </div>
      `;

      return calendarHtml;
    }

    function compressImage(file, maxWidth, quality) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();
        // Timeout: if compression takes >15s on mobile, fall back to raw data URL
        let resolved = false;
        const timeout = setTimeout(() => {
          if (!resolved) {
            resolved = true;
            // Fall back to reading as raw data URL (no compression)
            const fallbackReader = new FileReader();
            fallbackReader.onload = (ev) => resolve(ev.target.result);
            fallbackReader.onerror = () => reject(new Error('File read failed'));
            fallbackReader.readAsDataURL(file);
          }
        }, 15000);
        reader.onload = (e) => {
          img.onerror = () => {
            if (!resolved) {
              resolved = true;
              clearTimeout(timeout);
              // Image failed to load, use raw data URL
              resolve(e.target.result);
            }
          };
          img.onload = () => {
            if (resolved) return;
            resolved = true;
            clearTimeout(timeout);
            try {
              const canvas = document.createElement('canvas');
              const scale = Math.min(maxWidth / img.width, 1);
              canvas.width = img.width * scale;
              canvas.height = img.height * scale;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              resolve(canvas.toDataURL('image/jpeg', quality));
            } catch (err) {
              // Canvas failed (e.g., mobile memory limit), use raw data URL
              resolve(e.target.result);
            }
          };
          img.src = e.target.result;
        };
        reader.onerror = () => {
          if (!resolved) {
            resolved = true;
            clearTimeout(timeout);
            reject(new Error('File read failed'));
          }
        };
        reader.readAsDataURL(file);
      });
    }

    function handlePhotoUpload(event, fieldName) {
      const file = event.target.files[0];
      if (!file) return;

      function savePhoto(dataUrl, photoTime) {
        state.dailyData[fieldName] = dataUrl;
        state.dailyData[fieldName + 'Time'] = photoTime;
        saveDayData();
        render();
      }

      // Compress to max 800px wide, 60% quality (~50-100KB per photo)
      compressImage(file, 800, 0.6).then((compressedDataUrl) => {
        const photoTime = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

        // Upload to Firebase Storage if configured
        if (state.firebase.configured && state.firebase.storage) {
          try {
            const dateKey = state.currentDate.replace(/-/g, '');
            const storagePath = `photos/${dateKey}/${fieldName}_${Date.now()}.jpg`;
            const storageRef = state.firebase.storage.ref(storagePath);

            // Convert data URL to blob for upload
            const byteString = atob(compressedDataUrl.split(',')[1]);
            const mimeType = compressedDataUrl.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
            const blob = new Blob([ab], { type: mimeType });

            storageRef.put(blob, { contentType: 'image/jpeg' }).then(snapshot => {
              snapshot.ref.getDownloadURL().then(url => {
                savePhoto(url, photoTime);
              }).catch(() => savePhoto(compressedDataUrl, photoTime));
            }).catch(err => {
              console.error('Storage upload failed, saving locally:', err);
              savePhoto(compressedDataUrl, photoTime);
            });
          } catch (err) {
            console.error('Firebase photo upload error:', err);
            savePhoto(compressedDataUrl, photoTime);
          }
        } else {
          // No Firebase Storage: save compressed data URL to localStorage
          savePhoto(compressedDataUrl, photoTime);
        }
      }).catch((err) => {
        console.error('Photo compression failed:', err);
        // Last resort: try to read file as raw data URL
        const fallbackReader = new FileReader();
        fallbackReader.onload = (e) => {
          const photoTime = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
          savePhoto(e.target.result, photoTime);
        };
        fallbackReader.readAsDataURL(file);
      });
    }

    // ============= DAILY REPORT =============
    function generateDailyReport() {
      const d = state.dailyData;
      const date = state.currentDate;
      const compliance = Math.round(calculateCompliance() * 100);
      const lines = [];
      lines.push('📋 *BABA DAILY REPORT*');
      lines.push('📅 ' + date);
      lines.push('━━━━━━━━━━━━━━━');

      // Compliance
      lines.push('✅ Compliance: ' + compliance + '%');
      lines.push('');

      // Vitals
      lines.push('♥️ *VITALS*');
      if (d.vitals?.day) {
        const v = d.vitals.day;
        lines.push('☀️ Day: BP ' + (v.bp || '--') + ' | HR ' + (v.hr || '--') + ' | O2 ' + (v.o2 || '--') + '% | Temp ' + (v.temp || '--') + '°F | Sugar ' + (v.sugar || '--'));
      } else { lines.push('☀️ Day: Not recorded'); }
      if (d.vitals?.night) {
        const v = d.vitals.night;
        lines.push('🌙 Night: BP ' + (v.bp || '--') + ' | HR ' + (v.hr || '--') + ' | O2 ' + (v.o2 || '--') + '% | Temp ' + (v.temp || '--') + '°F | Sugar ' + (v.sugar || '--'));
      } else { lines.push('🌙 Night: Not recorded'); }
      lines.push('');

      // Medications
      lines.push('💊 *MEDICATIONS*');
      lines.push('AM: ' + (d.morningMed ? '✅ Given' : '❌ Not given'));
      lines.push('PM: ' + (d.eveningMed ? '✅ Given' : '❌ Not given'));
      lines.push('');

      // Supplements
      const sup = d.supplements || {};
      lines.push('💊 *SUPPLEMENTS*');
      lines.push('K-Lyte: ' + (sup.klyte ? sup.klyte + ' mL' : '❌'));
      lines.push('Omega-3: ' + (sup.omega3 ? '✅' : '❌'));
      lines.push('Magnesium: ' + (sup.magnesium ? '✅' : '❌'));
      lines.push('Ensure: ' + (sup.ensureDay ? '☀️✅' : '☀️❌') + ' ' + (sup.ensureNight ? '🌙✅' : '🌙❌'));
      lines.push('');

      // Fluids
      const wDay = d.waterDay || 0, wNight = d.waterNight || 0;
      const totalW = wDay + wNight + (d.waterIntake || 0);
      const uDay = d.urineDay || 0, uNight = d.urineNight || 0;
      const totalU = uDay + uNight;
      lines.push('💧 *FLUIDS*');
      lines.push('Intake: ' + totalW + '/1200 mL (☀️' + wDay + ' 🌙' + wNight + ')');
      lines.push('Output: ' + totalU + ' mL (☀️' + uDay + ' 🌙' + uNight + ')');
      lines.push('Net: ' + (totalW - totalU >= 0 ? '+' : '') + (totalW - totalU) + ' mL');
      lines.push('');

      // Nutrition
      const meals = d.meals || {};
      lines.push('🍽️ *NUTRITION*');
      ['breakfast', 'lunch', 'dinner', 'snacks'].forEach(m => {
        const meal = meals[m];
        const label = m.charAt(0).toUpperCase() + m.slice(1);
        if (meal && meal.pct !== undefined) {
          lines.push(label + ': ' + meal.pct + '%' + (meal.note ? ' (' + meal.note + ')' : ''));
        } else {
          lines.push(label + ': Not recorded');
        }
      });
      lines.push('');

      // BiPAP & Sleep
      const bDay = d.bipapDay || 0, bNight = d.bipapNight || 0;
      const sDay = d.sleepDay || 0, sNight = d.sleepNight || 0;
      lines.push('🌬️ *BIPAP & SLEEP*');
      lines.push('BiPAP: ' + (bDay + bNight) + '/8 hrs (☀️' + bDay + ' 🌙' + bNight + ')');
      lines.push('Sleep: ' + (sDay + sNight) + ' hrs (☀️' + sDay + ' 🌙' + sNight + ')');
      lines.push('');

      // Activities
      const act = d.activities || {};
      const actDone = ['lounge','garden','park','drive','friends'].filter(a => act[a]);
      if (actDone.length > 0) {
        lines.push('🌳 *ACTIVITIES*');
        lines.push(actDone.map(a => a.charAt(0).toUpperCase() + a.slice(1)).join(', '));
        if (act.note) lines.push('Note: ' + act.note);
        lines.push('');
      }

      // Hygiene
      const hyg = d.hygiene || {};
      const hygDone = [];
      if (hyg.diaperAM) hygDone.push('Diaper AM');
      if (hyg.diaperPM) hygDone.push('Diaper PM');
      if (hyg.oralCare) hygDone.push('Oral Care');
      if (hyg.skinCare) hygDone.push('Skin Care');
      if (hyg.brushAM) hygDone.push('Brush AM');
      if (hyg.brushPM) hygDone.push('Brush PM');
      if (hygDone.length > 0) {
        lines.push('🚿 *HYGIENE*');
        lines.push(hygDone.join(', '));
        lines.push('');
      }

      // Red flags
      const flags = getRedFlags();
      if (flags.length > 0) {
        lines.push('🚨 *ALERTS*');
        flags.forEach(f => lines.push(f.msg));
        lines.push('');
      }

      // Pharmacy
      const pharmacy = d.pharmacy || [];
      if (pharmacy.length > 0) {
        lines.push('🏥 *PHARMACY & SUPPLIES*');
        pharmacy.forEach(p => lines.push((p.urgent ? '🔴 ' : '• ') + p.name + (p.note ? ' (' + p.note + ')' : '')));
        lines.push('');
      }

      // Notes
      const notes = d.notes || [];
      if (notes.length > 0) {
        lines.push('📝 *NOTES*');
        notes.forEach(n => lines.push(n.author + ': ' + n.text));
      }

      return lines.join('\n');
    }

    function sendViaCallMeBot(phone, apiKey, message) {
      const encoded = encodeURIComponent(message);
      const url = 'https://api.callmebot.com/whatsapp.php?phone=' + encodeURIComponent(phone) + '&text=' + encoded + '&apikey=' + encodeURIComponent(apiKey);
      return fetch(url).then(r => {
        if (!r.ok) throw new Error('CallMeBot error: ' + r.status);
        return r;
      });
    }

    async function sendDailyReport() {
      const recipients = state.alerts.recipients;
      if (!recipients || recipients.length === 0) {
        alert('No recipients configured. Go to Settings to add family members.');
        return;
      }
      const report = generateDailyReport();
      let sent = 0, failed = 0;
      for (const r of recipients) {
        try {
          await sendViaCallMeBot(r.phone, r.apiKey, report);
          sent++;
          // Small delay between sends to avoid rate limiting
          if (recipients.length > 1) await new Promise(res => setTimeout(res, 2000));
        } catch (e) {
          console.error('Failed to send to ' + r.name + ':', e);
          failed++;
        }
      }
      const status = '📤 Report sent to ' + sent + '/' + recipients.length + ' recipients' + (failed > 0 ? ' (' + failed + ' failed)' : '');
      alert(status);
      state.alerts.lastReportSent = new Date().toISOString();
      localStorage.setItem('alerts_lastReportSent', state.alerts.lastReportSent);
    }

    // Auto-send check every minute
    setInterval(() => {
      const now = new Date();
      const timeStr = now.toTimeString().slice(0, 5);
      const today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');

      // Auto-send daily report
      if (timeStr === state.alerts.reportTime && state.alerts.lastReportSent.slice(0, 10) !== today) {
        if (state.alerts.recipients && state.alerts.recipients.length > 0) {
          sendDailyReport();
        }
      }
    }, 60000);

    // ============= INITIALIZATION =============
    initFirebase();
    loadDayData();
    loadMonthlyTasks();
    render();
  </script>
</body>
</html>
