<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Baba Care Shared">
  <meta name="theme-color" content="#0a0a0a">
  <title>Baba Care Dashboard - Shared</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
    * { -webkit-user-select: none; user-select: none; font-family: 'JetBrains Mono', 'Courier New', monospace; }
    input, textarea, select { -webkit-user-select: text; user-select: text; }
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); background: #0a0a0a !important; color: #ff9900; }
    .safe-area-pb { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
    @supports (padding: max(0px)) {
      body { padding-left: max(0px, env(safe-area-inset-left)); padding-right: max(0px, env(safe-area-inset-right)); }
    }
    button { min-height: 44px; }
    input, textarea, select { min-height: 44px; font-size: 16px !important; background: #1a1a1a !important; color: #ff9900 !important; border-color: #333 !important; }
    input::placeholder, textarea::placeholder { color: #555 !important; }
    .compliance-ring { display: flex; align-items: center; justify-content: center; }
    .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 40; }
    .modal { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-radius: 0.5rem 0.5rem 0 0; max-height: 90vh; overflow-y: auto; z-index: 50; border-top: 2px solid #ff9900; }
    .grid-responsive { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 0.75rem; }
    @media (max-width: 768px) {
      .grid-responsive { grid-template-columns: 1fr; }
    }
    /* Bloomberg card overrides */
    .bb-card { background: #111 !important; border: 1px solid #222 !important; border-left: 3px solid #ff9900 !important; border-radius: 4px !important; }
    .bb-card-header { background: #1a1a1a !important; border-bottom: 1px solid #222 !important; }
    .bb-btn { background: #ff9900 !important; color: #000 !important; font-weight: 700; border-radius: 2px !important; text-transform: uppercase; letter-spacing: 0.5px; }
    .bb-btn:active { background: #cc7a00 !important; }
    .bb-btn-secondary { background: #1a1a1a !important; color: #ff9900 !important; border: 1px solid #333 !important; border-radius: 2px !important; }
    .bb-toggle-on { background: #0a2e0a !important; border-color: #00cc00 !important; color: #00ff00 !important; }
    .bb-toggle-off { background: #1a1a1a !important; border-color: #333 !important; color: #666 !important; }
    .bb-progress-track { background: #1a1a1a !important; border-radius: 2px !important; }
    .bb-progress-fill { border-radius: 2px !important; }
    .bb-vital-green { background: #0a1f0a !important; color: #00ff00 !important; }
    .bb-vital-orange { background: #1f1a0a !important; color: #ff9900 !important; }
    .bb-vital-red { background: #1f0a0a !important; color: #ff3333 !important; }
    .bb-vital-gray { background: #1a1a1a !important; color: #555 !important; }
    /* Table overrides for weekly view */
    table { border-collapse: collapse; }
    th, td { border-color: #333 !important; }
    th { background: #1a1a1a !important; color: #ff9900 !important; }
    td { background: #111 !important; }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    /* Alert banner */
    .bb-alert { background: #1f0a0a !important; border-left: 3px solid #ff3333 !important; }
    .bb-setup { background: #1f1a0a !important; border-left: 3px solid #ff9900 !important; }
    /* Global overrides for remaining Tailwind light classes */
    .bg-white, .bg-gray-50, .bg-gray-100 { background: #111 !important; }
    .bg-green-50, .bg-green-100 { background: #0a1f0a !important; }
    .bg-amber-50, .bg-yellow-50 { background: #1f1a0a !important; }
    .bg-red-50, .bg-red-100 { background: #1f0a0a !important; }
    .bg-blue-50, .bg-indigo-50, .bg-purple-50 { background: #0a0a1f !important; }
    .text-gray-800, .text-gray-700, .text-gray-600 { color: #ccc !important; }
    .text-gray-500, .text-gray-400, .text-gray-300 { color: #888 !important; }
    .text-green-500, .text-green-600, .text-green-700 { color: #00ff00 !important; }
    .text-amber-600, .text-amber-700, .text-yellow-700 { color: #ff9900 !important; }
    .text-red-500, .text-red-600, .text-red-800, .text-red-900 { color: #ff3333 !important; }
    .text-blue-600, .text-blue-700, .text-violet-600 { color: #00ccff !important; }
    .text-indigo-700, .text-purple-700 { color: #9999ff !important; }
    .border-gray-200, .border-gray-300, .border-gray-100 { border-color: #333 !important; }
    .border-green-500, .border-green-200 { border-color: #00cc00 !important; }
    .border-amber-200 { border-color: #cc7a00 !important; }
    .border-red-200 { border-color: #cc3333 !important; }
    .bg-blue-500, .bg-blue-400, .bg-blue-600 { background: #ff9900 !important; color: #000 !important; }
    .bg-green-500 { background: #00cc00 !important; color: #000 !important; }
    .bg-purple-500 { background: #9966ff !important; color: #000 !important; }
    .bg-amber-500 { background: #ff9900 !important; color: #000 !important; }
    .bg-teal-500 { background: #00cc99 !important; color: #000 !important; }
    .bg-gray-200 { background: #1a1a1a !important; }
    .border-t { border-color: #333 !important; }
    .border-b { border-color: #333 !important; }
    .border { border-color: #333 !important; }
    .rounded-lg, .rounded-xl { border-radius: 2px !important; }
    .rounded-full { border-radius: 2px !important; }
    .shadow-sm { box-shadow: none !important; }
    label { color: #ccc; }
    a { color: #00ccff !important; }
    /* Font overrides */
    h1, h2, h3, p, span, button, label, td, th, div { font-family: 'JetBrains Mono', 'Courier New', monospace !important; }
    /* Settings modal */
    .modal .sticky { background: #111 !important; border-color: #333 !important; }
    .modal h2 { color: #ff9900 !important; }
    .modal label { color: #ccc !important; }
  </style>
</head>
<body class="bg-black">
  <div id="app"></div>

  <script>
    // ============= STATE MANAGEMENT =============
    const state = {
      currentDate: new Date().toISOString().split('T')[0],
      view: 'daily', // 'daily', 'weekly', 'monthly'
      firebase: { configured: false, db: null },
      alerts: {
        phone: localStorage.getItem('alerts_phone') || '',
        apiKey: localStorage.getItem('alerts_apiKey') || '',
        recipients: JSON.parse(localStorage.getItem('alerts_recipients') || '[]'),
        reportTime: localStorage.getItem('alerts_reportTime') || '21:00',
        medTime: localStorage.getItem('alerts_medTime') || '10:00',
        waterNoon: localStorage.getItem('alerts_waterNoon') || '500',
        waterEod: localStorage.getItem('alerts_waterEod') || '1500',
        vitalDayTime: localStorage.getItem('alerts_vitalDayTime') || '08:00',
        vitalNightTime: localStorage.getItem('alerts_vitalNightTime') || '20:00',
        lastReportSent: localStorage.getItem('alerts_lastReportSent') || ''
      },
      settings: {
        setupExpanded: false,
        settingsOpen: false,
        firebaseApiKey: localStorage.getItem('firebase_apiKey') || 'AIzaSyC8ghzzMf9UVjMLEahJYNMhgdFkgjl1tO4',
        firebaseProjectId: localStorage.getItem('firebase_projectId') || 'babacare-5ace3',
        firebaseDbUrl: localStorage.getItem('firebase_dbUrl') || 'https://babacare-5ace3-default-rtdb.asia-southeast1.firebasedatabase.app'
      },
      dailyData: {},
      monthlyTasks: {},
      lastAlertCheck: 0
    };

    // ============= FIREBASE SETUP =============
    function initFirebase() {
      if (!state.settings.firebaseApiKey || !state.settings.firebaseDbUrl) return;

      try {
        const config = {
          apiKey: state.settings.firebaseApiKey,
          projectId: state.settings.firebaseProjectId,
          databaseURL: state.settings.firebaseDbUrl
        };

        if (!firebase.apps.length) {
          firebase.initializeApp(config);
        }

        state.firebase.db = firebase.database();
        state.firebase.storage = firebase.storage();
        state.firebase.configured = true;

        // Listen for changes
        const dateKey = state.currentDate.replace(/-/g, '');
        const ref = state.firebase.db.ref(`days/${dateKey}`);
        ref.on('value', (snapshot) => {
          if (snapshot.val()) {
            state.dailyData = snapshot.val();
            render();
          }
        });
      } catch (e) {
        console.error('Firebase error:', e);
        state.firebase.configured = false;
      }
    }

    function saveToFirebase(path, data) {
      if (!state.firebase.configured || !state.firebase.db) {
        localStorage.setItem(`cached_${path}`, JSON.stringify(data));
        return;
      }
      try {
        state.firebase.db.ref(path).set(data);
      } catch (e) {
        console.error('Firebase save error:', e);
      }
    }

    function loadFromLocalStorage(key, defaultVal = {}) {
      try {
        return JSON.parse(localStorage.getItem(key) || JSON.stringify(defaultVal));
      } catch {
        return defaultVal;
      }
    }

    // ============= UTILITY FUNCTIONS =============
    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function getDayOfWeek(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short' });
    }

    function getYearMonth(dateStr) {
      return dateStr.substring(0, 7);
    }

    function addDays(dateStr, days) {
      const d = new Date(dateStr + 'T00:00:00');
      d.setDate(d.getDate() + days);
      return d.toISOString().split('T')[0];
    }

    function getVitalStatus(metric, value) {
      if (metric === 'bp') {
        if (!value || value === '--') return 'gray';
        const parts = value.split('/');
        if (parts.length === 2) {
          const sys = parseInt(parts[0]), dia = parseInt(parts[1]);
          if (sys >= 180 || dia >= 120) return 'red';
          if (sys >= 140 || dia >= 90) return 'orange';
          if (sys < 90 || dia < 60) return 'orange';
        }
        return 'green';
      }
      if (metric === 'hr') return value > 100 || value < 60 ? 'orange' : 'green';
      if (metric === 'o2') return value < 95 ? 'red' : 'green';
      if (metric === 'temp') return value > 99.5 || value < 96.8 ? 'orange' : 'green';
      if (metric === 'sugar') return value > 180 || value < 80 ? 'orange' : 'green';
      if (metric === 'urine') {
        if (!value || value === 0) return 'gray';
        return value < 200 ? 'red' : value < 400 ? 'orange' : 'green';
      }
      return 'gray';
    }

    function calculateCompliance() {
      const data = state.dailyData;
      const checks = [
        data.morningMed, data.eveningMed, !!data.vitals?.day, !!data.vitals?.night,
        (data.waterDay || 0) + (data.waterNight || 0) + (data.waterIntake || 0) >= 1200, (data.bipapDay || 0) + (data.bipapNight || 0) >= 8
      ];
      const completed = checks.filter(Boolean).length;
      return completed / checks.length;
    }

    function getRedFlags() {
      const data = state.dailyData;
      const flags = [];

      if (data.morningMed === false) flags.push({ type: 'med', msg: '⚠ Morning medication not given' });
      if (data.eveningMed === false) flags.push({ type: 'med', msg: '⚠ Evening medication not given' });
      const totalFluid = (data.waterDay || 0) + (data.waterNight || 0) + (data.waterIntake || 0);
      if (totalFluid < 500) flags.push({ type: 'water', msg: '⚠ Low water intake (' + totalFluid + ' mL)' });
      ['day', 'night'].forEach(shift => {
        const v = (data.vitals || {})[shift];
        if (v) {
          if (getVitalStatus('o2', v.o2) === 'red') flags.push({ type: 'vital', msg: `⚠ Low oxygen (${shift} shift)` });
          if (getVitalStatus('hr', v.hr) === 'red') flags.push({ type: 'vital', msg: `⚠ Abnormal heart rate (${shift} shift)` });
          if (getVitalStatus('bp', v.bp) === 'red') flags.push({ type: 'vital', msg: `⚠ High BP (${shift} shift)` });
        }
      });
      const totalUrine = (data.urineDay || 0) + (data.urineNight || 0);
      if (totalUrine > 0 && totalUrine < 500) flags.push({ type: 'fluid', msg: '⚠ Daily urine output low (' + totalUrine + ' mL)' });
      const totalBipap = (data.bipapDay || 0) + (data.bipapNight || 0);
      if (totalBipap < 8 && new Date().getHours() >= 20) flags.push({ type: 'bipap', msg: '⚠ BiPAP below 8hr target (' + totalBipap + ' hrs)' });
      const hr = new Date().getHours();
      if (!data.vitals?.day && hr >= 10) flags.push({ type: 'vital', msg: '⚠ Day shift vitals not recorded' });
      if (!data.vitals?.night && hr >= 22) flags.push({ type: 'vital', msg: '⚠ Night shift vitals not recorded' });

      return flags;
    }

    // ============= RENDER FUNCTIONS =============
    function render() {
      const html = renderApp();
      document.getElementById('app').innerHTML = html;
      attachEventListeners();
    }

    function renderApp() {
      const flags = getRedFlags();
      let html = '';

      // Header
      html += `
        <div class="sticky top-0 z-30" style="background:#0a0a0a; border-bottom: 1px solid #333;">
          <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <div>
              <h1 class="text-lg font-bold" style="color:#ff9900; letter-spacing:2px;">BABA CARE <span style="color:#00cc00;">TERMINAL</span></h1>
              <p class="text-xs" style="color:#555;">SHARED HEALTH MONITORING SYSTEM</p>
            </div>
            <button id="settingsBtn" class="text-xl p-2" style="color:#ff9900;">⚙</button>
          </div>
          <div class="max-w-6xl mx-auto px-4 pb-3 flex gap-1">
            <button class="tab-btn px-4 py-1 text-xs font-bold uppercase" style="background:${state.view === 'daily' ? '#ff9900' : '#1a1a1a'}; color:${state.view === 'daily' ? '#000' : '#ff9900'}; border:1px solid #333; border-radius:2px;" data-view="daily">Daily</button>
            <button class="tab-btn px-4 py-1 text-xs font-bold uppercase" style="background:${state.view === 'weekly' ? '#ff9900' : '#1a1a1a'}; color:${state.view === 'weekly' ? '#000' : '#ff9900'}; border:1px solid #333; border-radius:2px;" data-view="weekly">Weekly</button>
            <button class="tab-btn px-4 py-1 text-xs font-bold uppercase" style="background:${state.view === 'monthly' ? '#ff9900' : '#1a1a1a'}; color:${state.view === 'monthly' ? '#000' : '#ff9900'}; border:1px solid #333; border-radius:2px;" data-view="monthly">Monthly</button>
          </div>
        </div>
      `;

      // Firebase setup banner
      if (!state.firebase.configured) {
        html += renderFirebaseSetupBanner();
      }

      // Red flag alerts
      if (flags.length > 0) {
        html += `
          <div class="bb-alert p-3 max-w-6xl mx-auto mt-2">
            <p class="font-bold text-xs uppercase mb-2" style="color:#ff3333; letter-spacing:1px;">▸ ALERTS</p>
            <div class="space-y-1">
              ${flags.map(f => `<p class="text-xs" style="color:#ff6666;">${f.msg}</p>`).join('')}
            </div>
          </div>
        `;
      }

      // Date navigation for daily view
      if (state.view === 'daily') {
        html += `
          <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <button id="prevDayBtn" class="bb-btn-secondary px-3 py-2 text-xs font-bold">◀ PREV</button>
            <span class="font-bold text-sm" style="color:#ff9900;">${formatDate(state.currentDate)}</span>
            <button id="nextDayBtn" class="bb-btn-secondary px-3 py-2 text-xs font-bold">NEXT ▶</button>
          </div>
        `;
        html += renderDailyView();
      } else if (state.view === 'weekly') {
        html += renderWeeklyView();
      } else if (state.view === 'monthly') {
        html += renderMonthlyView();
      }

      // Settings modal
      if (state.settings.settingsOpen) {
        html += renderSettingsModal();
      }

      return html;
    }

    function renderFirebaseSetupBanner() {
      return `
        <div class="bb-setup p-4 sticky top-20 z-20">
          <div class="flex items-center justify-between cursor-pointer" id="setupToggle">
            <div class="flex items-center gap-3 flex-1">
              <span class="text-2xl">⚙️</span>
              <div>
                <p class="font-semibold" style="color:#ff9900;">SETUP REQUIRED: Firebase Not Configured</p>
                <p class="text-sm text-amber-800">This app uses Firebase for real-time data sync. Click to configure.</p>
              </div>
            </div>
            <span class="text-xl">${state.settings.setupExpanded ? '▼' : '▶'}</span>
          </div>
          ${state.settings.setupExpanded ? `
            <div class="mt-4 bg-white rounded-lg p-4 space-y-3">
              <div class="text-sm text-gray-700 space-y-2">
                <p class="font-semibold">Steps to set up Firebase:</p>
                <ol class="list-decimal list-inside space-y-1">
                  <li>Go to <a href="https://console.firebase.google.com" target="_blank" class="text-blue-600 underline">Firebase Console</a></li>
                  <li>Create a new project or select existing</li>
                  <li>Enable Realtime Database (test mode)</li>
                  <li>Enable Storage (for medicine photos)</li>
                  <li>Get API Key from Settings > Project Settings</li>
                  <li>Get Project ID and Database URL</li>
                </ol>
              </div>
              <input type="text" id="firebaseApiKey" placeholder="API Key" value="${state.settings.firebaseApiKey}" class="w-full border rounded px-3 py-2 text-sm">
              <input type="text" id="firebaseProjectId" placeholder="Project ID" value="${state.settings.firebaseProjectId}" class="w-full border rounded px-3 py-2 text-sm">
              <input type="text" id="firebaseDbUrl" placeholder="Database URL (https://...firebaseio.com)" value="${state.settings.firebaseDbUrl}" class="w-full border rounded px-3 py-2 text-sm">
              <button id="setupBtn" class="bb-btn w-full px-3 py-2 text-xs">CONNECT FIREBASE</button>
            </div>
          ` : ''}
        </div>
      `;
    }

    function renderSettingsModal() {
      return `
        <div class="modal-backdrop" id="settingsBackdrop"></div>
        <div class="modal">
          <div class="sticky top-0 p-4 flex items-center justify-between" style="background:#111; border-bottom:1px solid #333;">
            <h2 class="text-sm font-bold uppercase" style="color:#ff9900; letter-spacing:1px;">⚙ SETTINGS & ALERTS</h2>
            <button id="closeSettingsBtn" style="color:#ff9900; font-size:20px;">✕</button>
          </div>
          <div class="p-4 space-y-4 safe-area-pb">
            <p class="text-xs font-bold uppercase" style="color:#ff9900; letter-spacing:1px;">DAILY REPORT (WHATSAPP)</p>
            <div>
              <label class="block text-xs font-semibold mb-1" style="color:#888;">Family Recipients (one per line: Name,Phone,APIKey)</label>
              <textarea id="recipientsInput" rows="4" placeholder="Sheryar,+923001234567,apikey123&#10;Ahmed,+923009876543,apikey456" class="w-full border rounded px-3 py-2 text-xs" style="font-family:monospace;">${state.alerts.recipients.map(r => r.name + ',' + r.phone + ',' + r.apiKey).join('\\n')}</textarea>
              <p style="font-size:9px; color:#555; margin-top:4px;">Each person needs their own CallMeBot API key. Send "I allow callmebot to send me messages" to +34 644 71 98 38 on WhatsApp to get one.</p>
            </div>
            <div>
              <label class="block text-xs font-semibold mb-1" style="color:#888;">Auto-send Report Time</label>
              <input type="time" id="reportTimeInput" value="${state.alerts.reportTime}" class="w-full border rounded px-3 py-2">
            </div>
            <button id="sendReportNowBtn" class="w-full px-3 py-2 text-xs font-bold" style="background:#1a3a1a; border:1px solid #00cc00; border-radius:2px; color:#00ff00; cursor:pointer;">📤 SEND REPORT NOW</button>

            <div style="border-top:1px solid #333; padding-top:12px;">
              <p class="text-xs font-bold uppercase" style="color:#ff9900; letter-spacing:1px;">REMINDERS</p>
            </div>
            <div>
              <label class="block text-xs font-semibold mb-1" style="color:#888;">Day Shift Vitals Reminder</label>
              <input type="time" id="vitalDayTimeInput" value="${state.alerts.vitalDayTime || '08:00'}" class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-xs font-semibold mb-1" style="color:#888;">Night Shift Vitals Reminder</label>
              <input type="time" id="vitalNightTimeInput" value="${state.alerts.vitalNightTime || '20:00'}" class="w-full border rounded px-3 py-2">
            </div>
            <div>
              <label class="block text-xs font-semibold mb-1" style="color:#888;">Medication Reminder</label>
              <input type="time" id="medTimeInput" value="${state.alerts.medTime}" class="w-full border rounded px-3 py-2">
            </div>
            <button id="saveSettingsBtn" class="bb-btn w-full px-3 py-2 text-xs">SAVE SETTINGS</button>
          </div>
        </div>
      `;
    }

    function renderDailyView() {
      const data = state.dailyData || {};
      const compliance = calculateCompliance();

      return `
        <div class="max-w-6xl mx-auto px-4 pt-3">
          ${renderComplianceBar(compliance)}
        </div>
        <div class="max-w-6xl mx-auto px-4 py-3 grid-responsive">
          ${renderCard('Vitals', '♥️', renderVitalsCard(data))}
          ${renderCard('Medications', '💊', renderMedicationsCard(data))}
          ${renderCard('Supplements', '💊', renderSupplementsCard(data))}
          ${renderCard('Fluid Balance', '💧', renderFluidBalanceCard(data))}
          ${renderCard('Nutrition', '🍽️', renderNutritionCard(data))}
          ${renderCard('Hygiene', '🚿', renderHygieneCard(data))}
          ${renderCard('Physiotherapy', '🏋️', renderPhysioCard(data))}
          ${renderCard('BiPAP & Sleep', '🌬️', renderBiPAPCard(data))}
          ${renderCard('Activities', '🌳', renderActivitiesCard(data))}

    function renderFluidBalanceCard(data) {
      const waterDay = data.waterDay || 0;
      const waterNight = data.waterNight || 0;
      const totalWater = waterDay + waterNight + (data.waterIntake || 0);
      const target = 1200;
      const pct = Math.min(totalWater / target, 1);
      const urineDay = data.urineDay || 0;
      const urineNight = data.urineNight || 0;
      const totalUrine = urineDay + urineNight;
      const netBalance = totalWater - totalUrine;

      return `
        <div class="space-y-3">
          <p class="text-xs font-bold uppercase" style="color:#888; letter-spacing:1px;">FLUID INTAKE</p>
          <div class="flex items-center justify-between">
            <span class="text-sm font-bold" style="color:#00ccff;">💧 ${totalWater} / ${target} mL</span>
            <span class="text-xs font-bold" style="color:${pct >= 1 ? '#00ff00' : '#ff9900'};">${Math.round(pct * 100)}%</span>
          </div>
          <div class="w-full h-3 bb-progress-track">
            <div class="h-3 bb-progress-fill transition-all duration-300" style="width:${pct * 100}%; background:${pct >= 1 ? '#00ff00' : '#00ccff'};"></div>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <div>
              <label style="font-size:9px; color:#888; display:block; margin-bottom:4px;">☀️ DAY (mL)</label>
              <input type="number" id="waterDayInput" placeholder="mL" value="${waterDay || ''}" class="w-full border rounded px-2 py-2 text-xs">
            </div>
            <div>
              <label style="font-size:9px; color:#888; display:block; margin-bottom:4px;">🌙 NIGHT (mL)</label>
              <input type="number" id="waterNightInput" placeholder="mL" value="${waterNight || ''}" class="w-full border rounded px-2 py-2 text-xs">
            </div>
          </div>

          <div class="pt-3 mt-2" style="border-top:1px solid #333;">
            <p class="text-xs font-bold uppercase mb-2" style="color:#888; letter-spacing:1px;">URINE OUTPUT</p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
              <div>
                <label style="font-size:9px; color:#888; display:block; margin-bottom:4px;">☀️ DAY (mL)</label>
                <input type="number" id="urineDayInput" placeholder="mL" value="${urineDay || ''}" class="w-full border rounded px-2 py-2 text-xs">
              </div>
              <div>
                <label style="font-size:9px; color:#888; display:block; margin-bottom:4px;">🌙 NIGHT (mL)</label>
                <input type="number" id="urineNightInput" placeholder="mL" value="${urineNight || ''}" class="w-full border rounded px-2 py-2 text-xs">
              </div>
            </div>
          </div>

          <button id="saveFluidBtn" class="bb-btn w-full px-2 py-2 text-xs">SAVE</button>

          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <div style="background:#1a1a1a; border:1px solid #333; border-radius:2px; padding:8px; text-align:center;">
              <span style="font-size:10px; color:#888;">TOTAL INTAKE</span>
              <p class="text-sm font-bold" style="color:${totalWater >= target ? '#00ff00' : totalWater > 0 ? '#00ccff' : '#555'};">${totalWater || '--'} mL</p>
            </div>
            <div style="background:#1a1a1a; border:1px solid #333; border-radius:2px; padding:8px; text-align:center;">
              <span style="font-size:10px; color:#888;">TOTAL OUTPUT</span>
              <p class="text-sm font-bold" style="color:${totalUrine < 500 && totalUrine > 0 ? '#ff3333' : totalUrine >= 500 ? '#00ff00' : '#555'};">${totalUrine || '--'} mL</p>
            </div>
          </div>
          <div style="background:${netBalance >= 0 ? '#0a1f0a' : '#1f0a0a'}; border:1px solid ${netBalance >= 0 ? '#00cc00' : '#cc3333'}; border-radius:2px; padding:8px; text-align:center;">
            <span style="font-size:10px; color:#888;">NET FLUID BALANCE</span>
            <p class="text-sm font-bold" style="color:${netBalance >= 0 ? '#00ff00' : '#ff3333'};">${netBalance >= 0 ? '+' : ''}${netBalance} mL</p>
          </div>
        </div>
      `;
    }

    function renderNutritionCard(data) {
      const meals = data.meals || {};
      const sections = [
        { id: 'breakfast', label: '🌅 BREAKFAST' },
        { id: 'lunch', label: '☀️ LUNCH' },
        { id: 'dinner', label: '🌙 DINNER' },
        { id: 'snacks', label: '🍎 SNACKS' }
      ];
      const pctOptions = [100, 75, 50, 25, 0];
      const pctLabels = { 100: 'All', 75: '¾', 50: '½', 25: '¼', 0: 'Refused' };
      const recorded = sections.filter(s => meals[s.id]?.pct !== undefined).length;

      return `
        <div class="space-y-3">
          <div style="background:#1a1a1a; border:1px solid #333; border-radius:2px; padding:8px; text-align:center;">
            <span style="font-size:10px; color:#888;">MEALS RECORDED</span>
            <p style="font-size:18px; font-weight:700; color:${recorded >= 3 ? '#00ff00' : recorded > 0 ? '#ff9900' : '#555'};">${recorded} / ${sections.length}</p>
          </div>
          ${sections.map(s => {
            const m = meals[s.id];
            const hasPct = m && m.pct !== undefined;
            const pctColor = !hasPct ? '#555' : m.pct >= 75 ? '#00ff00' : m.pct >= 50 ? '#ff9900' : '#ff3333';
            return `
              <div style="background:#111; border:1px solid ${hasPct ? '#333' : '#222'}; border-radius:2px; padding:8px;">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
                  <p style="font-size:11px; font-weight:700; color:#ff9900;">${s.label}</p>
                  ${hasPct ? `<span style="font-size:11px; font-weight:700; color:${pctColor};">${m.pct}% ${m.time ? '· ' + m.time : ''}</span>` : ''}
                </div>
                ${hasPct ? `
                  <div style="background:#1a1a1a; border-radius:2px; height:6px; overflow:hidden; margin-bottom:${m.note ? '6' : '0'}px;">
                    <div style="height:100%; width:${m.pct}%; background:${pctColor}; border-radius:2px;"></div>
                  </div>
                  ${m.note ? `<p style="font-size:10px; color:#888; margin-top:4px;">${m.note}</p>` : ''}
                ` : `
                  <div style="display:flex; gap:4px; margin-bottom:6px;">
                    ${pctOptions.map(p => `
                      <button type="button" class="mealPctBtn" data-meal="${s.id}" data-pct="${p}" style="flex:1; padding:6px 2px; font-size:${p === 0 ? '8px' : '10px'}; font-weight:700; background:#1a1a1a; border:1px solid #333; border-radius:2px; color:#ccc; cursor:pointer;">${pctLabels[p]}</button>
                    `).join('')}
                  </div>
                  <input type="text" id="meal_${s.id}_note" placeholder="Notes (optional)" class="w-full border rounded px-2 py-1 text-xs">
                `}
              </div>`;
          }).join('')}
        </div>
      `;
    }

    function renderMonthlyTasksCard(data) {
      const ym = getYearMonth(state.currentDate);
      const tasks = state.monthlyTasks[ym] || { catheter: false, vitaminD: false };

      // Catheter countdown — every 4 weeks (28 days)
      const lastCatheter = localStorage.getItem('lastCatheterDate') || '2025-02-17';
      const lastCathDate = new Date(lastCatheter + 'T00:00:00');
      const cathDiffDays = Math.floor((now - lastCathDate) / (1000 * 60 * 60 * 24));
      const cathRemaining = 28 - cathDiffDays;
      const cathColor = cathRemaining <= 0 ? '#ff3333' : cathRemaining <= 3 ? '#ff3333' : cathRemaining <= 7 ? '#ff9900' : '#00ff00';
      const cathNextDate = new Date(lastCathDate);
      cathNextDate.setDate(cathNextDate.getDate() + 28);
      const cathNextStr = cathNextDate.toISOString().split('T')[0];

      // Vitamin D — 1st of every month
      let vitDTarget = new Date(now.getFullYear(), now.getMonth(), 1);
      if (now > vitDTarget) {
        vitDTarget = new Date(now.getFullYear(), now.getMonth() + 1, 1);
      }
      const vitDDiff = Math.floor((vitDTarget - now) / (1000 * 60 * 60 * 24));
      const vitDColor = vitDDiff <= 0 ? '#ff3333' : vitDDiff <= 3 ? '#ff9900' : '#00ff00';
      const isVitDToday = vitDDiff === 0 || (now.getDate() === 1);

      return `
        <div class="space-y-3">
          <!-- Catheter -->
          <div style="background:#1a1a1a; border:1px solid ${cathRemaining <= 3 ? '#cc3333' : '#333'}; border-radius:2px; padding:10px; text-align:center;">
            <span style="font-size:10px; color:#888; letter-spacing:1px;">CATHETER CHANGE</span>
            <p style="font-size:24px; font-weight:700; color:${cathColor};">${cathRemaining <= 0 ? 'OVERDUE' : cathRemaining + ' days'}</p>
            <span style="font-size:9px; color:#555;">Next: ${cathNextStr} &middot; Last: ${lastCatheter}</span>
          </div>

          <!-- Vitamin D -->
          <div style="background:#1a1a1a; border:1px solid ${isVitDToday ? '#cc3333' : '#333'}; border-radius:2px; padding:10px; text-align:center;">
            <span style="font-size:10px; color:#888; letter-spacing:1px;">VITAMIN D</span>
            <p style="font-size:24px; font-weight:700; color:${isVitDToday ? '#ff3333' : vitDColor};">${isVitDToday ? 'TODAY' : vitDDiff + ' days'}</p>

    function getWeekDayData(dateStr) {

    function renderWeeklyRow(label, path, days) {
      return `
        <tr>
          <td style="border:1px solid #333; padding:4px; font-weight:700; font-size:11px; white-space:nowrap; color:#ff9900; background:#1a1a1a;">${label}</td>
          ${days.map(d => {
            const dd = getWeekDayData(d);
            let val = '-';
            let color = '';
            const parts = path.split('.');
            let obj = dd;
            for (const p of parts) { obj = obj ? obj[p] : undefined; }

            if (path === 'hygiene.brushCount') {
              const hyg = dd.hygiene || {};
              const count = (hyg.brushAM ? 1 : 0) + (hyg.brushPM ? 1 : 0);
              val = count + '/2';
              color = count === 2 ? 'text-green-600' : count === 1 ? 'text-amber-600' : 'text-red-500';
            } else if (typeof obj === 'boolean') {
              val = obj ? '✓' : '—';
              color = obj ? 'text-green-600' : 'text-gray-300';
            } else if (typeof obj === 'number') {
              val = obj;
              if (path === 'waterDay' || path === 'waterNight') color = obj >= 600 ? 'text-green-600' : obj >= 300 ? 'text-amber-600' : 'text-red-500';
              if (path === 'bipapMinutes') color = obj >= 480 ? 'text-green-600' : obj >= 300 ? 'text-amber-600' : 'text-red-500';
            } else if (typeof obj === 'string' && obj) {
              val = obj;
            }

            return '<td style="border:1px solid #333; padding:4px; text-align:center; font-size:11px; font-weight:600; background:#111;" class="' + color + '">' + val + '</td>';
          }).join('')}
        </tr>
      `;
    }

    function renderMonthlyView() {
      const ym = getYearMonth(state.currentDate);
      const date = new Date(state.currentDate + 'T00:00:00');
      const firstDay = new Date(date.getFullYear(), date.getMonth(), 1);
      const lastDay = new Date(date.getFullYear(), date.getMonth() + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startDay = firstDay.getDay();

      let calendarHtml = '';
      const weeks = [];
      let week = Array(startDay).fill(null);

      for (let i = 1; i <= daysInMonth; i++) {
        const dayStr = `${ym}-${String(i).padStart(2, '0')}`;
        week.push(dayStr);
        if (week.length === 7) {
          weeks.push(week);
          week = [];
        }
      }
      if (week.length > 0) {
        while (week.length < 7) week.push(null);
        weeks.push(week);
      }

      calendarHtml = `
        <div class="max-w-6xl mx-auto px-4 py-4">
          <h3 class="text-sm font-bold mb-4 uppercase" style="color:#ff9900; letter-spacing:1px;">${new Date(state.currentDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</h3>
          <div class="grid grid-cols-7 gap-1 mb-4">
            ${['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => `<div class="text-center font-bold text-xs p-2" style="color:#888;">${d}</div>`).join('')}
          </div>
          <div class="grid grid-cols-7 gap-1">
            ${weeks.map(w => w.map(d => {
              if (!d) return '<div style="background:#0a0a0a; border:1px solid #1a1a1a; border-radius:2px;" class="aspect-square"></div>';
              return `
                <button class="monthly-day aspect-square flex flex-col items-center justify-center text-xs font-bold" style="background:#111; border:1px solid #333; border-radius:2px; color:#ff9900;" data-date="${d}">
                  <span>${d.substring(8)}</span>
                  <span style="font-size:9px; color:#555;">--%</span>
                </button>
              `;
            }).join('')).join('')}
          </div>
        </div>
      `;

      return calendarHtml;
    }

    // ============= EVENT LISTENERS =============
    function attachEventListeners() {
      // Tab navigation
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          state.view = e.target.dataset.view;
          render();
        });
      });

      // Settings
      document.getElementById('settingsBtn').addEventListener('click', () => {
        state.settings.settingsOpen = !state.settings.settingsOpen;
        render();
      });

      if (document.getElementById('closeSettingsBtn')) {
        document.getElementById('closeSettingsBtn').addEventListener('click', () => {
          state.settings.settingsOpen = false;
          render();
        });
      }

      if (document.getElementById('settingsBackdrop')) {
        document.getElementById('settingsBackdrop').addEventListener('click', () => {
          state.settings.settingsOpen = false;
          render();
        });
      }

    function compressImage(file, maxWidth, quality) {
      return new Promise((resolve) => {
        const img = new Image();
        const reader = new FileReader();
        reader.onload = (e) => {
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const scale = Math.min(maxWidth / img.width, 1);
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function handlePhotoUpload(event, fieldName) {
      const file = event.target.files[0];
      if (!file) return;

      // Compress to max 800px wide, 60% quality (~50-100KB per photo)
      compressImage(file, 800, 0.6).then((compressedDataUrl) => {
        const dateKey = state.currentDate.replace(/-/g, '');
        const photoTime = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

        // Upload to Firebase Storage if configured
        if (state.firebase.configured && state.firebase.storage) {
          const storagePath = `photos/${dateKey}/${fieldName}_${Date.now()}.jpg`;
          const storageRef = state.firebase.storage.ref(storagePath);

          // Convert data URL to blob for upload
          fetch(compressedDataUrl).then(r => r.blob()).then(blob => {
            storageRef.put(blob, { contentType: 'image/jpeg' }).then(snapshot => {
              snapshot.ref.getDownloadURL().then(url => {
                // Store the Firebase Storage URL (permanent, accessible by all)
                state.dailyData[fieldName] = url;
                state.dailyData[fieldName + 'Time'] = photoTime;
                saveDayData();
                render();
              });
            }).catch(err => {
              console.error('Storage upload failed, saving locally:', err);
              // Fallback: save compressed data URL locally
              state.dailyData[fieldName] = compressedDataUrl;
              state.dailyData[fieldName + 'Time'] = photoTime;
              saveDayData();
              render();
            });
          });
        } else {
          // No Firebase: save compressed data URL to localStorage
          state.dailyData[fieldName] = compressedDataUrl;
          state.dailyData[fieldName + 'Time'] = photoTime;
          saveDayData();
          render();
        }
      });
    }

    function saveDayData() {
      const dateKey = state.currentDate.replace(/-/g, '');
      localStorage.setItem(`day_${dateKey}`, JSON.stringify(state.dailyData));
      saveToFirebase(`days/${dateKey}`, state.dailyData);
    }

    function loadDayData() {
      const dateKey = state.currentDate.replace(/-/g, '');
      const cached = localStorage.getItem(`day_${dateKey}`);
      if (cached) {
        state.dailyData = JSON.parse(cached);
      } else {
        state.dailyData = {};
      }
      render();
    }

    // ============= DAILY REPORT =============
    function generateDailyReport() {
      const d = state.dailyData;
      const date = state.currentDate;
      const compliance = Math.round(calculateCompliance() * 100);
      const lines = [];
      lines.push('📋 *BABA DAILY REPORT*');
      lines.push('📅 ' + date);
      lines.push('━━━━━━━━━━━━━━━');

      // Compliance
      lines.push('✅ Compliance: ' + compliance + '%');
      lines.push('');

      // Vitals
      lines.push('♥️ *VITALS*');
      if (d.vitals?.day) {
        const v = d.vitals.day;
        lines.push('☀️ Day: BP ' + (v.bp || '--') + ' | HR ' + (v.hr || '--') + ' | O2 ' + (v.o2 || '--') + '% | Temp ' + (v.temp || '--') + '°F | Sugar ' + (v.sugar || '--'));
      } else { lines.push('☀️ Day: Not recorded'); }
      if (d.vitals?.night) {
        const v = d.vitals.night;
        lines.push('🌙 Night: BP ' + (v.bp || '--') + ' | HR ' + (v.hr || '--') + ' | O2 ' + (v.o2 || '--') + '% | Temp ' + (v.temp || '--') + '°F | Sugar ' + (v.sugar || '--'));
      } else { lines.push('🌙 Night: Not recorded'); }
      lines.push('');

      // Medications
      lines.push('💊 *MEDICATIONS*');
      lines.push('AM: ' + (d.morningMed ? '✅ Given' : '❌ Not given'));
      lines.push('PM: ' + (d.eveningMed ? '✅ Given' : '❌ Not given'));
      lines.push('');

      // Supplements
      const sup = d.supplements || {};
      lines.push('💊 *SUPPLEMENTS*');
      lines.push('K-Lyte: ' + (sup.klyte ? sup.klyte + ' mL' : '❌'));
      lines.push('Omega-3: ' + (sup.omega3 ? '✅' : '❌'));
      lines.push('Magnesium: ' + (sup.magnesium ? '✅' : '❌'));
      lines.push('Ensure: ' + (sup.ensureDay ? '☀️✅' : '☀️❌') + ' ' + (sup.ensureNight ? '🌙✅' : '🌙❌'));
      lines.push('');

      // Fluids
      const wDay = d.waterDay || 0, wNight = d.waterNight || 0;
      const totalW = wDay + wNight + (d.waterIntake || 0);
      const uDay = d.urineDay || 0, uNight = d.urineNight || 0;
      const totalU = uDay + uNight;
      lines.push('💧 *FLUIDS*');
      lines.push('Intake: ' + totalW + '/1200 mL (☀️' + wDay + ' 🌙' + wNight + ')');
      lines.push('Output: ' + totalU + ' mL (☀️' + uDay + ' 🌙' + uNight + ')');
      lines.push('Net: ' + (totalW - totalU >= 0 ? '+' : '') + (totalW - totalU) + ' mL');
      lines.push('');

      // Nutrition
      const meals = d.meals || {};
      lines.push('🍽️ *NUTRITION*');
      ['breakfast', 'lunch', 'dinner', 'snacks'].forEach(m => {
        const meal = meals[m];
        const label = m.charAt(0).toUpperCase() + m.slice(1);
        if (meal && meal.pct !== undefined) {
          lines.push(label + ': ' + meal.pct + '%' + (meal.note ? ' (' + meal.note + ')' : ''));
        } else {
          lines.push(label + ': Not recorded');
        }
      });
      lines.push('');

      // BiPAP & Sleep
      const bDay = d.bipapDay || 0, bNight = d.bipapNight || 0;
      const sDay = d.sleepDay || 0, sNight = d.sleepNight || 0;
      lines.push('🌬️ *BIPAP & SLEEP*');
      lines.push('BiPAP: ' + (bDay + bNight) + '/8 hrs (☀️' + bDay + ' 🌙' + bNight + ')');
      lines.push('Sleep: ' + (sDay + sNight) + ' hrs (☀️' + sDay + ' 🌙' + sNight + ')');
      lines.push('');

      // Activities
      const act = d.activities || {};
      const actDone = ['lounge','garden','park','drive','friends'].filter(a => act[a]);
      if (actDone.length > 0) {
        lines.push('🌳 *ACTIVITIES*');
        lines.push(actDone.map(a => a.charAt(0).toUpperCase() + a.slice(1)).join(', '));
        if (act.note) lines.push('Note: ' + act.note);
        lines.push('');
      }

      // Hygiene
      const hyg = d.hygiene || {};
      const hygDone = [];
      if (hyg.diaperAM) hygDone.push('Diaper AM');
      if (hyg.diaperPM) hygDone.push('Diaper PM');
      if (hyg.oralCare) hygDone.push('Oral Care');
      if (hyg.skinCare) hygDone.push('Skin Care');
      if (hyg.brushAM) hygDone.push('Brush AM');
      if (hyg.brushPM) hygDone.push('Brush PM');
      if (hygDone.length > 0) {
        lines.push('🚿 *HYGIENE*');
        lines.push(hygDone.join(', '));
        lines.push('');
      }

      // Red flags
      const flags = getRedFlags();
      if (flags.length > 0) {
        lines.push('🚨 *ALERTS*');
        flags.forEach(f => lines.push(f.msg));
        lines.push('');
      }

      // Pharmacy
      const pharmacy = d.pharmacy || [];
      if (pharmacy.length > 0) {
        lines.push('🏥 *PHARMACY & SUPPLIES*');
        pharmacy.forEach(p => lines.push((p.urgent ? '🔴 ' : '• ') + p.name + (p.note ? ' (' + p.note + ')' : '')));
        lines.push('');
      }

      // Notes
      const notes = d.notes || [];
      if (notes.length > 0) {
        lines.push('📝 *NOTES*');
        notes.forEach(n => lines.push(n.author + ': ' + n.text));
      }

      return lines.join('\n');
    }

    function sendViaCallMeBot(phone, apiKey, message) {
      const encoded = encodeURIComponent(message);
      const url = 'https://api.callmebot.com/whatsapp.php?phone=' + encodeURIComponent(phone) + '&text=' + encoded + '&apikey=' + encodeURIComponent(apiKey);
      return fetch(url).then(r => {
        if (!r.ok) throw new Error('CallMeBot error: ' + r.status);
        return r;
      });
    }

    async function sendDailyReport() {
      const recipients = state.alerts.recipients;
      if (!recipients || recipients.length === 0) {
        alert('No recipients configured. Go to Settings to add family members.');
        return;
      }
      const report = generateDailyReport();
      let sent = 0, failed = 0;
      for (const r of recipients) {
        try {
          await sendViaCallMeBot(r.phone, r.apiKey, report);
          sent++;
          // Small delay between sends to avoid rate limiting
          if (recipients.length > 1) await new Promise(res => setTimeout(res, 2000));
        } catch (e) {
          console.error('Failed to send to ' + r.name + ':', e);
          failed++;
        }
      }
      const status = '📤 Report sent to ' + sent + '/' + recipients.length + ' recipients' + (failed > 0 ? ' (' + failed + ' failed)' : '');
      alert(status);
      state.alerts.lastReportSent = new Date().toISOString();
      localStorage.setItem('alerts_lastReportSent', state.alerts.lastReportSent);
    }

    // Auto-send check every minute
    setInterval(() => {
      const now = new Date();
      const timeStr = now.toTimeString().slice(0, 5);
      const today = now.toISOString().split('T')[0];

      // Auto-send daily report
      if (timeStr === state.alerts.reportTime && state.alerts.lastReportSent.slice(0, 10) !== today) {
        if (state.alerts.recipients && state.alerts.recipients.length > 0) {
          sendDailyReport();
        }
      }
    }, 60000);

    // ============= INITIALIZATION =============
    initFirebase();
    loadDayData();
    loadMonthlyTasks();
    render();
  </script>
</body>
</html>
